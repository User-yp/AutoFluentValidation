name: 发布 NuGet 包

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'       # 推送 v1.0.0 格式的 tag 时触发
  workflow_dispatch:                      # 支持手动触发
    inputs:
      version:
        description: '版本号 (留空则使用 csproj 中的版本)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x

      - name: 解析版本号
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # 手动触发时使用输入的版本号
            echo "PACKAGE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            # tag 触发时，去掉 v 前缀作为版本号
            TAG_NAME="${{ github.ref_name }}"
            echo "PACKAGE_VERSION=${TAG_NAME#v}" >> $GITHUB_ENV
          else
            echo "PACKAGE_VERSION=1.0.0-preview" >> $GITHUB_ENV
          fi
          echo "将发布版本: $PACKAGE_VERSION"

      - name: 还原依赖
        run: dotnet restore AutoFluentValidation/AutoFluentValidation.csproj

      - name: 构建 (Release)
        run: |
          dotnet build AutoFluentValidation/AutoFluentValidation.csproj \
            --configuration Release \
            --no-restore \
            -p:Version=${{ env.PACKAGE_VERSION }}

      - name: 打包
        run: |
          dotnet pack AutoFluentValidation/AutoFluentValidation.csproj \
            --configuration Release \
            --no-build \
            -p:Version=${{ env.PACKAGE_VERSION }} \
            --output ./nupkgs

      - name: 推送到 NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
